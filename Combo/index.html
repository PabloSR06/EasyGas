<!DOCTYPE html>

<head>

                <button class="saveDataButton" type="submit" onclick="saveData()" id="saveDataButton">
                    Guardar Preferencias

        </div>

                // myJSON += ',';
                // myJSON += '"IDMunicipio":';
                // myJSON += '"'+municipio+'"';
                // myJSON += ',';
                // myJSON += '"basicData":';
                // myJSON += 'true';
                // myJSON += '}';
               

                document.cookie = "IDCCAA=" + comunidad + " ; expires=Thu, 18 Dec 2100 12:00:00 UTC";
                document.cookie = "IDPovincia=" + provincia + " ; expires=Thu, 18 Dec 2100 12:00:00 UTC";
                document.cookie = "IDMunicipio=" + municipio + " ; expires=Thu, 18 Dec 2100 12:00:00 UTC";
                document.cookie = "data=" + true + " ; expires=Thu, 18 Dec 2100 12:00:00 UTC";

            }



        }

</body>
