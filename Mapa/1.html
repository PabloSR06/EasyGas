<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .mapa {
            display: block;
            border: none;
            height: 100vh;
            width: 100vw;
            margin: 0;
        }
    </style>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.0.3/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">

    
</head>

<body>

    <div id="mapid" class="mapa"></div>


    <script src="https://unpkg.com/leaflet@1.0.3/dist/leaflet.js"></script>
    <script>
        var mymap = L.map('mapid').setView([28.463439, -16.289347], 13);

        L.tileLayer('https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token=pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ.rJcFIG214AriISLbB6B5aw', {
            maxZoom: 29,
            attribution: '<a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            id: 'mapbox/streets-v11',
            tileSize: 512,
            zoomOffset: -1
        }).addTo(mymap);


        L.marker([28.463439, -16.289347]).addTo(mymap)
            .bindPopup("precios").openPopup();
        L.marker([27.463439, -15.289347]).addTo(mymap)
            .bindPopup("precios").openPopup();

        var popup = L.popup();

        function onMapClick(e) {
            popup
                .setLatLng(e.latlng)
                .setContent("Latitud, Longitud " + e.latlng.toString())
                .openOn(mymap);
        }

        mymap.on('click', onMapClick);
    </script>
    <script src="../js/jquery-3.6.0.min.js"></script>

    <script>

        $('.btn_alerta').click(function () {
            $('.alert_div').fadeIn(100);
        });

        $('.alert_div').click(function () {
            $(this).fadeOut(100);
        });


    </script>

</body>

</html>
